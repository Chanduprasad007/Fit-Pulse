<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chandu's 6-day gym workout planner with a modern training split, clean progression tracking, and a gym-first visual theme."
    />
    <meta name="theme-color" content="#070a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fit Pulse" />
    <title>Fit Pulse</title>
    <link rel="manifest" href="./app.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="dark">
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-cluster">
          <p class="eyebrow">Fit Pulse</p>
          <div>
            <h1>Fit Pulse</h1>
            <p class="hero-text">6-day hypertrophy split with cleaner tracking and a sharper gym theme.</p>
          </div>
        </div>
        <div class="utility-cluster">
          <div id="auth-shell" class="auth-shell topbar-auth"></div>
          <button id="install-app" class="ghost-button install-button hidden" type="button">Install App</button>
          <button id="theme-toggle" class="ghost-button theme-toggle" type="button">Dark Mode</button>
        </div>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Today</p>
          <h2>Train the next day in the cycle and let the app handle progression.</h2>
          <div class="trigger-shell">
            <p class="small-copy">Quick Coach Triggers</p>
            <div id="trigger-chip-list" class="trigger-chip-list"></div>
            <p id="coach-trigger-message" class="coach-trigger-message muted"></p>
          </div>
          <div class="hero-actions">
            <button id="jump-to-workout" class="primary-button">View Today</button>
            <button id="print-workout" class="ghost-button">Print Card</button>
          </div>
        </div>
        <div class="hero-panel" id="hero-panel"></div>
      </section>

      <main class="main-grid">
        <section class="panel dashboard-panel">
          <div class="section-heading compact-heading">
            <p class="eyebrow">6-Day Split</p>
            <h2>Weekly Rotation</h2>
          </div>
          <div id="stats-grid" class="stats-grid"></div>
          <div id="week-split" class="week-split"></div>
          <div id="coach-insights" class="coach-insights"></div>
          <div id="nutrition-strip" class="nutrition-strip"></div>
        </section>

        <section class="panel workout-panel" id="workout-panel">
          <div class="section-heading compact-heading">
            <p class="eyebrow">Today</p>
            <h2>Workout Queue</h2>
          </div>
          <div id="workout-summary" class="workout-summary"></div>
          <div id="coach-brief" class="coach-brief"></div>
          <div id="exercise-list" class="exercise-list"></div>
        </section>

        <section class="panel tools-panel">
          <div class="section-heading compact-heading">
            <p class="eyebrow">Tracker</p>
            <h2>Backup & Settings</h2>
          </div>
          <div class="tools-grid">
            <label class="settings-card">
              <span>Upper-body increment (kg)</span>
              <input id="upper-increment" type="number" min="1" step="0.5" />
            </label>
            <label class="settings-card">
              <span>Lower-body increment (kg)</span>
              <input id="lower-increment" type="number" min="1" step="0.5" />
            </label>
            <button id="save-settings" class="primary-button">Save Progression</button>
            <button id="export-data" class="ghost-button">Export Data</button>
            <label class="ghost-button file-input">
              <span>Import Data</span>
              <input id="import-data" type="file" accept="application/json" />
            </label>
            <button id="reset-data" class="danger-button">Reset Data</button>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
